<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎾 FRIESENBERGER KLASSE 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; }
        body { background: #1a1e1b; font-family: system-ui, sans-serif; padding: 16px 12px; color: #f0eadb; }
        .page { max-width: 1000px; margin: 0 auto; background: #2c312b; border-radius: 36px; padding: 22px 18px; border: 1px solid #4e5b4c; }
        h1 { font-size: 2.1rem; border-bottom: 3px solid #b89b6b; padding-bottom: 16px; margin-bottom: 20px; color: #f3e7d3; display: flex; justify-content: space-between; }
        h2 { font-size: 1.8rem; margin: 30px 0 16px; color: #dbc9a8; border-left: 12px solid #b89b6b; padding-left: 18px; }
        .btn { background: #3e493b; border: 1px solid #7b8b74; color: #f2e5d0; padding: 10px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; }
        .admin-panel { background: #232b22; padding: 16px; border-radius: 30px; margin: 20px 0; border: 1px dashed #b89b6b; }
        .hidden { display: none !important; }
        input { background: #1e241c; border: 1px solid #8a7b60; color: #f2e5d0; padding: 8px 14px; border-radius: 40px; }
        .team-badge { background: #1f2a1e; padding: 6px 16px; border-radius: 32px; border: 1px solid #7e8d76; margin: 6px; display: inline-block; }
        .match-card { background: #232b20; border-radius: 28px; padding: 18px; margin-bottom: 22px; border: 1px solid #5f7256; }
        .score { font-family: monospace; font-size: 2rem; background: #10170e; padding: 6px 18px; border-radius: 48px; border: 1px solid #b89b6b; }
        table { width: 100%; border-collapse: collapse; background: #1e261c; border-radius: 24px; margin: 25px 0; }
        th { background: #3c4d36; padding: 14px; text-align: left; }
        td { padding: 14px; border-bottom: 1px solid #4b5e45; }
        [contenteditable="true"] { border-bottom: 2px dotted #b89b6b; outline: none; min-width: 50px; display: inline-block; }
        .admin-mode .editable:hover { background: #3d5436; }
    </style>
</head>
<body>
<div class="page" id="mainPage">
    <h1>🎾 FRIESENBERGER KLASSE <small>2026</small>
        <button class="btn" id="adminToggle">🔓 Admin</button>
    </h1>
    <div id="adminPanel" class="admin-panel hidden">
        <input type="password" id="passInput" placeholder="Passwort">
        <button class="btn" id="loginBtn">Freischalten</button>
        <button class="btn" id="saveBtn" style="background:#7b6b4b;">💾 Speichern</button>
        <button class="btn" id="resetBtn">↻ Reset</button>
        <p id="statusMsg"></p>
    </div>

    <h2>👥 Teams</h2>
    <div id="teamsArea"></div>

    <h2>📅 Spielplan</h2>
    <div id="matchesArea"></div>

    <h2>🏆 Rangliste</h2>
    <table id="rankingTable"><tbody id="rankingBody"></tbody></table>
</div>

<script>
    (function(){
        // STARDDATEN (wie aus den Bildern)
        const DEFAULT_DATA = {
            teams: {
                A: { long: "🇩🇪 Marjan Dujak · 🇧🇪 Ilmi Brati", short: "🇩🇪 Dujak · 🇧🇪 Brati I." },
                B: { long: "🇵🇸 Artan Pnishi · 🇦🇺 Arben Pnishi", short: "🇵🇪 Pnishi A. · 🇵🇪 Pnishi Ar." },
                C: { long: "🇨🇴 Driton Zemaj · 🇧🇷 Arbnon Brati", short: "🇩🇪 Zemaj · 🇧🇷 Brati Ar." },
                D: { long: "🇲🇾 Limi Maxharraj · 🇦🇷 Rocco Siffredi", short: "🇲🇾 Maxharraj · 🇸🇮 Siffredi" },
                E: { long: "🇮🇶 Cipriano Gionni · 🇦🇷 Liridon Ajvazi", short: "🇮🇹 Cipriano · 🇮🇹 Ajvazi" },
                F: { long: "🇧🇹 Guxim Berisha · 🇫🇷 Durim Berisha", short: "🇫🇷 Berisha G. · 🇫🇷 Berisha D." }
            },
            matches: [
                [{t1:"A",t2:"F",s:[[6,3],[6,0],[7,6]],d:"Do 26.03. 21:00 Yakinarena"},
                 {t1:"B",t2:"E",s:[[6,2],[6,3],[6,0]],d:"Do 26.03. 21:30 Yakinarena"},
                 {t1:"C",t2:"D",s:[[7,5],[7,5],[6,3]],d:"Do 26.03. 21:30 Yakinarena"}],
                [{t1:"A",t2:"E",s:[[6,3],[2,6],[1,6]],d:"Mo 30.03. 21:00 Unipadel"},
                 {t1:"F",t2:"D",s:[[0,6],[1,6],[3,6]],d:"Di 31.03. 21:00 Unipadel"},
                 {t1:"B",t2:"C",s:[[5,7],[5,3],[]],d:"Mo 30.03. 21:00 Unipadel"}],
                [{t1:"A",t2:"D",s:[[4,6],[7,5],[6,2]],d:"Mi 08.04. 21:00 Yakinarena"},
                 {t1:"E",t2:"C",s:[[0,6],[0,6],[3,6]],d:"Do 16.04. Rümlang"},
                 {t1:"F",t2:"B",s:[[0,6],[1,6],[2,6]],d:"Mi 08.04. 21:00 Yakinarena"}],
                [{t1:"A",t2:"C",s:[[2,6],[4,6],[2,6]],d:"Di 14.04. Spreitenbach"},
                 {t1:"D",t2:"B",s:[[4,6],[6,4],[2,6]],d:"Do 16.04. Unipadel"},
                 {t1:"E",t2:"F",s:[[],[],[]],d:"??.04."}],
                [{t1:"A",t2:"B",s:[[1,6],[5,7],[2,6]],d:"18.03. 21:30 PDL"},
                 {t1:"C",t2:"F",s:[[],[],[]],d:"??.04."},
                 {t1:"D",t2:"E",s:[[],[],[]],d:"??.04."}]
            ]
        };

        let data = JSON.parse(localStorage.getItem('friesenbergerSave')) || JSON.parse(JSON.stringify(DEFAULT_DATA));
        let isAdmin = false;
        const PW = "friesenberger2026";

        const teamsArea = document.getElementById('teamsArea');
        const matchesArea = document.getElementById('matchesArea');
        const rankingBody = document.getElementById('rankingBody');
        const adminPanel = document.getElementById('adminPanel');
        const statusMsg = document.getElementById('statusMsg');

        function renderAll() {
            // Teams
            teamsArea.innerHTML = '';
            Object.entries(data.teams).forEach(([id, t]) => {
                const div = document.createElement('div'); div.className = 'team-badge';
                div.innerHTML = `<strong>Team ${id}</strong> <span contenteditable="${isAdmin}" class="editable" data-team="${id}" data-field="long">${t.long}</span>`;
                teamsArea.appendChild(div);
            });
            // Matches
            matchesArea.innerHTML = '';
            data.matches.forEach((week, w) => {
                const h3 = document.createElement('h3'); h3.textContent = `📆 Woche ${w+1}`; matchesArea.appendChild(h3);
                week.forEach((m, i) => {
                    const card = document.createElement('div'); card.className = 'match-card';
                    card.innerHTML = `
                        <div><span contenteditable="${isAdmin}" class="editable" data-week="${w}" data-idx="${i}" data-field="date">${m.d}</span> ${m.s?.[0]?.[0]>m.s?.[0]?.[1]?'🏆':''}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span>Team ${m.t1} <span contenteditable="${isAdmin}" class="editable" data-team="${m.t1}" data-field="short">${data.teams[m.t1].short}</span></span>
                            <span class="score"><span contenteditable="${isAdmin}" class="editable" data-week="${w}" data-idx="${i}" data-field="sets">${m.s.map(s=>s.length? s[0]+':'+s[1]:'-').join(' ')}</span></span>
                            <span>Team ${m.t2} <span contenteditable="${isAdmin}" class="editable" data-team="${m.t2}" data-field="short">${data.teams[m.t2].short}</span></span>
                        </div>`;
                    matchesArea.appendChild(card);
                });
            });
            // Rangliste
            const pts = { A:0,B:0,C:0,D:0,E:0,F:0 };
            data.matches.flat().forEach(m => {
                if(!m.s[0] || m.s[0].length===0) return;
                let t1w=0, t2w=0;
                m.s.forEach(s => { if(s[0]>s[1]) t1w++; else if(s[1]>s[0]) t2w++; });
                if(t1w===3) pts[m.t1]+=3; else if(t2w===3) pts[m.t2]+=3;
                else if(t1w===2) { pts[m.t1]+=2; pts[m.t2]+=1; } else if(t2w===2) { pts[m.t2]+=2; pts[m.t1]+=1; }
            });
            const sorted = Object.entries(pts).sort((a,b) => b[1]-a[1]);
            rankingBody.innerHTML = '';
            sorted.forEach(([t,p],i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${i+1}</td><td>Team ${t} <span contenteditable="${isAdmin}" class="editable" data-team="${t}" data-field="short">${data.teams[t].short}</span></td><td>${p}</td>`;
                rankingBody.appendChild(tr);
            });
        }

        function handleEdit(e) {
            if(!isAdmin) return;
            const el = e.target.closest('[data-field]'); if(!el) return;
            const field = el.dataset.field;
            if(field === 'long' || field === 'short') {
                data.teams[el.dataset.team][field] = el.innerText;
            } else if(field === 'date') {
                data.matches[el.dataset.week][el.dataset.idx].d = el.innerText;
            } else if(field === 'sets') {
                const w = el.dataset.week, i = el.dataset.idx;
                const parts = el.innerText.trim().split(/\s+/);
                data.matches[w][i].s = parts.map(p => p==='-' ? [] : p.split(':').map(Number));
            }
            if(field !== 'sets') renderAll();
        }

        document.addEventListener('input', handleEdit);
        document.getElementById('adminToggle').onclick = () => adminPanel.classList.toggle('hidden');
        document.getElementById('loginBtn').onclick = () => {
            isAdmin = document.getElementById('passInput').value === PW;
            statusMsg.textContent = isAdmin ? '✅ Admin-Modus aktiv' : '❌ Falsches Passwort';
            document.getElementById('mainPage').classList.toggle('admin-mode', isAdmin);
            renderAll();
        };
        document.getElementById('saveBtn').onclick = () => {
            localStorage.setItem('friesenbergerSave', JSON.stringify(data));
            alert('💾 Gespeichert!');
        };
        document.getElementById('resetBtn').onclick = () => {
            if(confirm('Alles zurücksetzen?')) {
                data = JSON.parse(JSON.stringify(DEFAULT_DATA));
                renderAll(); alert('Zurückgesetzt.');
            }
        };
        renderAll();
    })();
</script>
</body>
</html>
